name: "402coffee Certify"
description: "Certify your x402 paying agent against 402.coffee in CI — real payment test + optional risk-score gate."
author: "402.coffee"
branding:
  icon: "coffee"
  color: "yellow"

inputs:
  mode:
    description: "certify (paid, default) — run the real payment tests and mint a fresh certificate. verify (FREE) — check the wallet's existing credential is current (no spend, no secret needed if wallet-address is given); ideal for PR checks while a scheduled certify keeps the credential fresh."
    required: false
    default: "certify"
  wallet-key:
    description: "Private key (0x…) of a FUNDED test wallet (a little USDC on Base; gasless, no ETH). Store it as a GitHub Actions secret and pass it here — never hard-code it. Required for mode: certify; optional for mode: verify (wallet-address suffices)."
    required: false
    default: ""
  wallet-address:
    description: "Wallet address (0x…) to check in mode: verify — lets PR checks run with NO secret at all."
    required: false
    default: ""
  tests:
    description: "Comma-separated tests to run: basic, suite. Default: basic."
    required: false
    default: "basic"
  min-tier:
    description: "Optional. Fail the job if the wallet's 402.coffee /score tier is below this (A, B, C, D, or F). Setting this pays $0.10 for one score lookup."
    required: false
    default: ""
  api-base:
    description: "API base URL (advanced/testing)."
    required: false
    default: "https://api.402.coffee"

outputs:
  cert-url:
    description: "Public certificate URL of the last test that ran."
    value: ${{ steps.run.outputs.cert-url }}
  badge-url:
    description: "README badge (SVG) URL of the last certificate."
    value: ${{ steps.run.outputs.badge-url }}
  badge-markdown:
    description: "Ready-to-paste README badge markdown."
    value: ${{ steps.run.outputs.badge-markdown }}
  verified:
    description: "mode: verify — true if the wallet currently holds a fresh PASS and no fresh FAIL."
    value: ${{ steps.run.outputs.verified }}
  tier:
    description: "Risk-score tier (only set when min-tier was provided)."
    value: ${{ steps.run.outputs.tier }}
  passed:
    description: "true if every test was conformant and the tier gate (if any) passed."
    value: ${{ steps.run.outputs.passed }}

runs:
  using: "composite"
  steps:
    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: "20"
    - name: Run 402coffee certification
      id: run
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        INPUT_MODE: ${{ inputs.mode }}
        INPUT_WALLET_KEY: ${{ inputs.wallet-key }}
        INPUT_WALLET_ADDRESS: ${{ inputs.wallet-address }}
        INPUT_TESTS: ${{ inputs.tests }}
        INPUT_MIN_TIER: ${{ inputs.min-tier }}
        INPUT_API_BASE: ${{ inputs.api-base }}
      run: |
        npm install --no-audit --no-fund --silent
        node certify.mjs
